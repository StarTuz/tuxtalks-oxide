# cargo-deny configuration

[graph]
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
